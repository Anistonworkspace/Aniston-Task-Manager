name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time — queue, never cancel mid-deploy
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1: Build & Validate
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm install --production=false

      - name: Install client dependencies
        run: cd client && npm install

      - name: Lint check
        run: cd client && npx --yes eslint src/App.jsx src/main.jsx --no-eslintrc --rule '{"no-undef":"error","no-unused-vars":"warn"}' --env browser,es2021 --parser-options ecmaVersion:latest,ecmaFeatures:{jsx:true},sourceType:module 2>/dev/null || echo "Lint check completed"

      - name: Build client
        run: cd client && npm run build

      - name: Verify build output
        run: |
          test -f client/dist/index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f client/dist/sw.js || (echo "ERROR: sw.js not found" && exit 1)
          if grep -q '__BUILD_TIMESTAMP__' client/dist/sw.js; then
            echo "ERROR: __BUILD_TIMESTAMP__ was NOT replaced in sw.js"
            exit 1
          fi
          echo "Build verified: index.html, sw.js present, timestamp injected"

  # Job 2: Deploy (requires manual approval via environment)
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          # Forward both ENV_FILE (deploy/.env contents) and the one-time
          # password-reset feature flag into the SSH session. The flag is a
          # GitHub Actions repository VARIABLE (not a secret), so flipping
          # it on/off does not require rotating any secret.
          envs: ENV_FILE,RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN
          script: |
            set -e

            DEPLOY_DIR="$HOME/Aniston-Task-Manager"
            COMPOSE_FILE="deploy/docker-compose.yml"
            REPO_URL="https://github.com/Anistonworkspace/Aniston-Task-Manager.git"
            HEALTH_URL="http://localhost:5000/api/health"
            MAX_RETRIES=10
            RETRY_DELAY=6

            echo "=== [1/8] Ensuring repo exists ==="
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Repo not found — cloning fresh..."
              rm -rf "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"

            echo "=== [2/8] Saving rollback point ==="
            PREVIOUS_SHA=$(git rev-parse HEAD)
            echo "Current commit: $PREVIOUS_SHA"

            echo "=== [3/8] Pulling latest code ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            CURRENT_SHA=$(git rev-parse HEAD)
            echo "Deploying commit: $CURRENT_SHA"

            echo "=== [4/8] Creating .env from GitHub secret ==="
            if [ -n "${ENV_FILE:-}" ]; then
              echo "$ENV_FILE" > deploy/.env
              echo ".env created ($(wc -l < deploy/.env) lines)"
            else
              echo "WARNING: ENV_FILE empty — using existing .env"
            fi

            echo "=== [5/8] Building new images ==="
            docker compose -f "$COMPOSE_FILE" build

            echo "=== [6/8] Restarting containers ==="
            # Pre-flight: log anything already bound to our ports so a failure is easy to diagnose.
            # We no longer publish 5432 to the host, but we still want visibility into 5000/3000.
            echo "--- Pre-flight port check ---"
            for p in 5000 3000; do
              HOLDER=$(docker ps --format '{{.Names}} {{.Ports}}' | grep ":$p->" || true)
              if [ -n "$HOLDER" ]; then
                echo "  Port $p currently held by: $HOLDER"
              fi
            done
            docker compose -f "$COMPOSE_FILE" up -d --no-build --remove-orphans

            echo "=== [7/8] Health check (retry loop) ==="
            HEALTHY=false
            for i in $(seq 1 $MAX_RETRIES); do
              sleep $RETRY_DELAY
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
              echo "  Attempt $i/$MAX_RETRIES — HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Health check passed!"
                HEALTHY=true
                break
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo ""
              echo "!!! HEALTH CHECK FAILED — ROLLING BACK !!!"
              echo "--- Backend logs (last 50 lines) ---"
              docker logs --tail 50 aph-backend 2>&1 || true
              echo ""
              echo "Rolling back to: $PREVIOUS_SHA"
              git reset --hard "$PREVIOUS_SHA"
              docker compose -f "$COMPOSE_FILE" build 2>&1 || true
              docker compose -f "$COMPOSE_FILE" up -d --no-build --remove-orphans 2>&1 || true
              sleep 15
              if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
                echo "Rollback succeeded — previous version is live"
              else
                echo "CRITICAL: Rollback also failed — manual intervention required"
              fi
              exit 1
            fi

            echo "=== [8/9] Running database seeds (idempotent) ==="
            docker exec aph-backend node seed-users.js || true
            docker exec aph-backend node seed-hierarchy.js || true

            echo "=== [9/9] One-time password reset (guarded) ==="
            # This runs the deploy/run-onetime-password-reset.sh wrapper
            # ONLY when RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN=true is
            # set as a GitHub Actions repo variable. The wrapper itself is
            # the no-op fast path when the flag is unset; we still call it
            # unconditionally so a flag flip is picked up on the next
            # deploy without any workflow edit.
            #
            # The wrapper:
            #   - validates the aph-backend container is healthy
            #   - confirms NODE_ENV=production and CLIENT_URL is non-local
            #     inside the container
            #   - runs the reset script in dry-run, asserts exactly the
            #     two expected accounts resolved
            #   - re-runs with --execute and a DB-backed maintenance
            #     marker so a re-deploy with the flag still on is a
            #     clean exit-0 no-op
            #
            # If this step fails, deployment fails (set -e at top). The
            # backend rollout above has already completed successfully,
            # so the app is up regardless of the reset hook outcome.
            chmod +x deploy/run-onetime-password-reset.sh 2>/dev/null || true
            RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN="${RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN:-}" \
              deploy/run-onetime-password-reset.sh

            echo "=== Setup daily backup cron (2 AM) ==="
            chmod +x deploy/backup.sh 2>/dev/null || true
            (crontab -l 2>/dev/null | grep -v 'aph-postgres.*backup'; echo "0 2 * * * docker exec aph-postgres sh /backup.sh >> /var/log/db-backup.log 2>&1") | sort -u | crontab - || true

            echo "=== Cleaning up old Docker images ==="
            docker image prune -f 2>/dev/null || true

            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Deployment complete ==="
            echo "Commit: $CURRENT_SHA"
            echo "Previous: $PREVIOUS_SHA"
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          # Repo VARIABLE (not secret). Set to "true" to trigger the
          # guarded one-time password-reset hook in deploy step [9/9].
          # Leave unset (or set to "false"/anything else) for the normal
          # no-op path. After a successful one-time run the in-DB
          # marker prevents re-runs even if this remains "true", but
          # please flip it back so deploy logs stay tidy.
          RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN: ${{ vars.RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN }}
