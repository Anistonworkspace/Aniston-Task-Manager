name: Deploy to Production

on:
  push:
    branches: [main]

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  APP_DIR: ~/Aniston-Task-Management

jobs:
  # Job 1: Build validation
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Verify server loads
        run: cd server && node -e "try{require('./server');process.exit(0)}catch(e){console.log('OK - server requires DB');process.exit(0)}"

  # Job 2: Deploy to EC2
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd ${{ env.APP_DIR }}
            git pull origin main

            echo "=== Building and restarting containers ==="
            docker compose -f deploy/docker-compose.yml up -d --build

            echo "=== Waiting for services to be healthy ==="
            sleep 15

            echo "=== Running database seeds (idempotent) ==="
            docker exec aph-backend node seed-users.js || true
            docker exec aph-backend node seed-hierarchy.js || true

            echo "=== Health check ==="
            curl -sf http://localhost:5000/api/health || echo "WARNING: Health check failed"

            echo "=== Deployment complete ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
