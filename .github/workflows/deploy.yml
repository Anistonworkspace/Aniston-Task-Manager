name: Deploy to Production

on:
  push:
    branches: [main]

env:
  APP_DIR: ~/Aniston-Task-Manager

jobs:
  # Job 1: Build validation
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm install --production=false

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

  # Job 2: Deploy to EC2
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd ~/Aniston-Task-Manager
            git fetch origin main
            git reset --hard origin/main

            echo "=== Building and restarting containers ==="
            docker compose -f deploy/docker-compose.yml up -d --build

            echo "=== Waiting for services to be healthy ==="
            sleep 15

            echo "=== Running database seeds (idempotent) ==="
            docker exec aph-backend node seed-users.js || true
            docker exec aph-backend node seed-hierarchy.js || true

            echo "=== Health check ==="
            curl -sf http://localhost:5000/api/health || echo "WARNING: Health check failed"

            echo "=== Deployment complete ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
