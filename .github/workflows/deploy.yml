name: Build & Deploy

# Production deploy pipeline.
#
# Safety model:
#   1. Build job runs lint + server tests + client tests + build verification.
#      Failure here blocks the deploy step.
#   2. Deploy job is gated by GitHub Environment "production" — required reviewers
#      must click Approve. Set this up in repo Settings → Environments.
#   3. Pre-deploy pg_dump snapshot lets ops manually restore if a deploy
#      corrupts data. Snapshots are kept on the EC2 host (last 30).
#   4. Health check loop + auto-rollback on failure. DB schema changes are
#      forward-only — auto-rollback restores code only; manual DB restore
#      may be needed for breaking schema changes.
#   5. Slack alert (if SLACK_WEBHOOK_URL set) fires on rollback failure.
#   6. Seed scripts (seed-users.js, seed-hierarchy.js) are prod-safe by
#      default — see server/seed-*.js prod-mode guards.
#   7. The one-time Sunny/Muskan password reset is gated to OFF unless
#      explicitly enabled via repo variable or workflow_dispatch input.
#
# NEVER bypass the production environment approval gate.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_password_reset_sunny_muskan:
        description: "Run one-time Sunny/Muskan production password reset on this deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      onetime_reset_rerun_key:
        description: "Optional unique rerun key, e.g. password-reset-sunny-muskan-2026-05-rerun-1"
        required: false
        default: ""
        type: string

# Only one deploy at a time — queue, never cancel mid-deploy
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1: Build & Validate
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        # TODO: if npm ci fails due to an out-of-sync lockfile, temporarily
        # swap to `npm install --production=false` for this one step only,
        # then regenerate package-lock.json and revert.
        run: cd server && npm ci

      - name: Run server tests
        run: cd server && npm test

      - name: Install client dependencies
        # NOTE: client/package-lock.json is out of sync with package.json on
        # Linux runners (cross-platform optional-deps drift) so `npm ci`
        # fails fast on Ubuntu while Windows/macOS dev installs succeed.
        # `npm install --no-audit --no-fund` is the documented workaround
        # until the lockfile is regenerated on Linux. The security-gate
        # workflow uses the same install path so both pipelines stay in sync.
        run: cd client && npm install --no-audit --no-fund

      - name: Run client tests
        run: cd client && npm test

      - name: Lint check
        run: cd client && npx --yes eslint src/App.jsx src/main.jsx --no-eslintrc --rule '{"no-undef":"error","no-unused-vars":"warn"}' --env browser,es2021 --parser-options ecmaVersion:latest,ecmaFeatures:{jsx:true},sourceType:module 2>/dev/null || echo "Lint check completed"

      - name: Build client
        run: cd client && npm run build

      - name: Verify build output
        run: |
          test -f client/dist/index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f client/dist/sw.js || (echo "ERROR: sw.js not found" && exit 1)
          if grep -q '__BUILD_TIMESTAMP__' client/dist/sw.js; then
            echo "ERROR: __BUILD_TIMESTAMP__ was NOT replaced in sw.js"
            exit 1
          fi
          echo "Build verified: index.html, sw.js present, timestamp injected"

  # Job 2: Deploy (requires manual approval via environment)
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          # Forward ENV_FILE (deploy/.env contents) plus the two one-time
          # password-reset inputs into the SSH session. Both inputs are
          # FLAGS, not secrets — flipping them on/off does not require
          # rotating any secret.
          envs: ENV_FILE,RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN,ONETIME_RESET_RERUN_KEY,SLACK_WEBHOOK_URL
          script: |
            set -e

            DEPLOY_DIR="$HOME/Aniston-Task-Manager"
            COMPOSE_FILE="deploy/docker-compose.yml"
            REPO_URL="https://github.com/Anistonworkspace/Aniston-Task-Manager.git"
            HEALTH_URL="http://localhost:5000/api/health"
            MAX_RETRIES=10
            RETRY_DELAY=6

            echo "=== [1/8] Ensuring repo exists ==="
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Repo not found — cloning fresh..."
              rm -rf "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"

            echo "=== [2/8] Saving rollback point ==="
            PREVIOUS_SHA=$(git rev-parse HEAD)
            echo "Current commit: $PREVIOUS_SHA"

            echo "=== [3/8] Pulling latest code ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            CURRENT_SHA=$(git rev-parse HEAD)
            echo "Deploying commit: $CURRENT_SHA"

            echo "=== [4/8] Creating .env from GitHub secret ==="
            if [ -n "${ENV_FILE:-}" ]; then
              echo "$ENV_FILE" > deploy/.env
              echo ".env created ($(wc -l < deploy/.env) lines)"
            else
              echo "WARNING: ENV_FILE empty — using existing .env"
            fi

            echo "=== [4.5/8] Pre-deploy database snapshot ==="
            mkdir -p ~/Aniston-Task-Manager-backups || true
            docker exec aph-postgres sh -c 'pg_dump -U postgres aniston_project_hub | gzip' > ~/Aniston-Task-Manager-backups/pre-deploy-$(date +%Y%m%d_%H%M%S)-${CURRENT_SHA:0:8}.sql.gz 2>/dev/null || echo "WARNING: pre-deploy snapshot failed (postgres may not be running yet on first deploy)"
            ls -lh ~/Aniston-Task-Manager-backups/ | tail -5
            # Retain last 30 pre-deploy snapshots
            ls -t ~/Aniston-Task-Manager-backups/pre-deploy-*.sql.gz 2>/dev/null | tail -n +31 | xargs -r rm -f

            echo "=== [5/8] Building new images ==="
            docker compose -f "$COMPOSE_FILE" build

            echo "=== [6/8] Restarting containers ==="
            # Pre-flight: log anything already bound to our ports so a failure is easy to diagnose.
            # We no longer publish 5432 to the host, but we still want visibility into 5000/3000.
            echo "--- Pre-flight port check ---"
            for p in 5000 3000; do
              HOLDER=$(docker ps --format '{{.Names}} {{.Ports}}' | grep ":$p->" || true)
              if [ -n "$HOLDER" ]; then
                echo "  Port $p currently held by: $HOLDER"
              fi
            done
            docker compose -f "$COMPOSE_FILE" up -d --no-build --remove-orphans

            echo "=== [7/8] Health check (retry loop) ==="
            HEALTHY=false
            for i in $(seq 1 $MAX_RETRIES); do
              sleep $RETRY_DELAY
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
              echo "  Attempt $i/$MAX_RETRIES — HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Health check passed!"
                HEALTHY=true
                break
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo ""
              echo "!!! HEALTH CHECK FAILED — ROLLING BACK !!!"
              echo "--- Backend logs (last 50 lines) ---"
              docker logs --tail 50 aph-backend 2>&1 || true
              echo ""
              echo "Rolling back to: $PREVIOUS_SHA"
              git reset --hard "$PREVIOUS_SHA"
              docker compose -f "$COMPOSE_FILE" build 2>&1 || true
              docker compose -f "$COMPOSE_FILE" up -d --no-build --remove-orphans 2>&1 || true
              sleep 15
              if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
                echo "Rollback succeeded — previous version is live"
              else
                echo "CRITICAL: Rollback also failed — manual intervention required"
                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  curl -s -X POST -H 'Content-type: application/json' \
                    --data "{\"text\":\":rotating_light: PROD DEPLOY ROLLBACK FAILED on $(hostname). Manual intervention required. Commit: $CURRENT_SHA → tried rollback to $PREVIOUS_SHA.\"}" \
                    "$SLACK_WEBHOOK_URL" || true
                fi
              fi
              exit 1
            fi

            echo "=== [8/9] Running database seeds (idempotent) ==="
            docker exec aph-backend node seed-users.js || true
            docker exec aph-backend node seed-hierarchy.js || true

            echo "=== [9/9] One-time password reset (guarded) ==="
            # This runs the deploy/run-onetime-password-reset.sh wrapper
            # ONLY when RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN=true. We
            # still call it unconditionally so a flag flip is picked up on
            # the next deploy without any workflow edit. The wrapper logs
            # a very loud "did not run" message when the flag is missing,
            # so it's impossible to confuse "skipped" with "ran".
            #
            # Two equivalent ways to enable the run:
            #   A) Repo Variable RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN=true
            #      (Settings → Secrets and variables → Actions → Variables)
            #   B) Manual workflow_dispatch input
            #      run_password_reset_sunny_muskan=true
            #
            # Optional: ONETIME_RESET_RERUN_KEY (or workflow_dispatch input
            # onetime_reset_rerun_key) supplies a fresh rerun key that
            # overrides the original maintenance-key marker for THIS run.
            #
            # If this step fails, deployment fails (set -e at top). The
            # backend rollout above has already completed successfully,
            # so the app is up regardless of the reset hook outcome.
            chmod +x deploy/run-onetime-password-reset.sh 2>/dev/null || true
            RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN="${RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN:-}" \
              ONETIME_RESET_RERUN_KEY="${ONETIME_RESET_RERUN_KEY:-}" \
              deploy/run-onetime-password-reset.sh

            echo "=== Setup daily backup cron (2 AM) ==="
            chmod +x deploy/backup.sh 2>/dev/null || true
            (crontab -l 2>/dev/null | grep -v 'aph-postgres.*backup'; echo "0 2 * * * docker exec aph-postgres sh /backup.sh >> /var/log/db-backup.log 2>&1") | sort -u | crontab - || true

            echo "=== Cleaning up old Docker images ==="
            docker image prune -f 2>/dev/null || true

            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Deployment complete ==="
            echo "Commit: $CURRENT_SHA"
            echo "Previous: $PREVIOUS_SHA"
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          # Effective flag: TRUE if EITHER the repo variable is set to
          # "true" OR the workflow_dispatch input is "true".
          #   - Repo Variable: Settings → Secrets and variables → Actions
          #     → Variables → RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN
          #   - workflow_dispatch input: run_password_reset_sunny_muskan
          # After a successful one-time run, the in-DB marker prevents
          # re-runs of the SAME key even if this remains "true". Please
          # flip both back to "false" anyway, so deploy logs stay tidy.
          RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN: ${{ (vars.RUN_ONE_TIME_PASSWORD_RESET_SUNNY_MUSKAN == 'true' || github.event.inputs.run_password_reset_sunny_muskan == 'true') && 'true' || 'false' }}
          # Effective rerun key: workflow_dispatch input wins, then repo
          # variable, then empty (no rerun). When non-empty, this run
          # uses the rerun key as its marker, bypassing the original
          # maintenance-key marker check. Use this when Sunny/Muskan
          # need to be reset a second time after a previous reset
          # already ran (the original marker is already in the DB).
          ONETIME_RESET_RERUN_KEY: ${{ github.event.inputs.onetime_reset_rerun_key || vars.ONETIME_RESET_RERUN_KEY || '' }}
          # Optional: Slack webhook used to alert on rollback failure only.
          # If unset, the rollback failure path still exits 1 — no alert sent.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
