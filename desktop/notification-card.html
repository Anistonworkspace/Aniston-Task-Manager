<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Monday Aniston Notification</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src file: data:; script-src 'unsafe-inline';" />
<style>
  /* -----------------------------------------------------------------
   * Teams-style notification card — Monday Aniston branding.
   * Slice 12: bigger, lighter-by-default, app-theme aware.
   *
   * Visual targets (matching the Teams reference screenshot):
   *   - Card 376px wide (window 400, 24px h padding)
   *   - Light card by default; dark only when payload.theme === 'dark'
   *     OR (payload.theme === 'auto' AND OS prefers dark)
   *   - Thin purple-blue gradient strip at the top
   *   - 40 px round avatar with gradient
   *   - Bold 14.5px title, 13px body
   *   - Generous padding so the card breathes
   *   - Subtle entrance/exit animation + hover lift
   *
   * Position constraints (driven by notificationWindow.js):
   *   - Bottom-right of workArea, 56 px above the taskbar
   *   - Frameless, transparent, skip-taskbar, non-focusable
   * --------------------------------------------------------------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    color: #1f2228;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
    cursor: default;
  }
  body {
    padding: 10px 12px 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  /* Card. Width: 376 (window 400 - 24 padding).
     LIGHT default per Slice 12 UX requirement. Dark applies only via
     `body.theme-dark` (forwarded via IPC) or when payload.theme is
     'auto' AND the OS prefers dark. */
  .card {
    width: 376px;
    background: #ffffff;
    color: #1f2228;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow:
      0 16px 40px rgba(15, 23, 42, 0.18),
      0 4px 12px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    pointer-events: auto;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px) scale(0.985);
    transition: opacity 240ms ease-out, transform 240ms ease-out, box-shadow 200ms ease, border-color 200ms ease;
  }
  .card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .card.leaving {
    opacity: 0;
    transform: translateY(10px) scale(0.985);
  }
  .card:hover {
    box-shadow:
      0 22px 50px rgba(15, 23, 42, 0.24),
      0 6px 16px rgba(15, 23, 42, 0.12);
    border-color: #d1d5db;
  }

  /* Top accent strip — Teams-style purple-blue gradient identity. */
  .accent {
    height: 4px;
    background: linear-gradient(90deg, #5B5FC7 0%, #4F52B2 50%, #6B4FB8 100%);
  }

  /* App header row. */
  .header {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 12px 16px 8px 16px;
  }
  .app-icon {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    object-fit: contain;
    flex: 0 0 auto;
  }
  .app-name {
    font-size: 13px;
    font-weight: 600;
    color: #4F52B2; /* Teams-purple accent */
    letter-spacing: 0.2px;
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .ts {
    font-size: 11.5px;
    color: #6b7280;
    flex: 0 0 auto;
  }
  .close-btn {
    background: transparent;
    border: 0;
    padding: 0;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    cursor: pointer;
    border-radius: 5px;
    flex: 0 0 auto;
    transition: background 120ms ease, color 120ms ease;
  }
  .close-btn:hover {
    background: #f3f4f6;
    color: #111827;
  }
  .close-btn svg { width: 13px; height: 13px; }

  /* Body — avatar + title + message. */
  .body {
    padding: 4px 16px 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 13px;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5B5FC7 0%, #4F52B2 100%);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex: 0 0 auto;
    user-select: none;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 8px rgba(91, 95, 199, 0.32);
  }
  .text {
    flex: 1;
    min-width: 0;
  }
  .title {
    font-size: 14.5px;
    font-weight: 600;
    color: #111827;
    line-height: 1.35;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .message {
    font-size: 13px;
    color: #4b5563;
    margin-top: 5px;
    line-height: 1.5;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* CTA footer — subtle "Open in Monday Aniston →" affordance. */
  .cta {
    border-top: 1px solid #f1f3f5;
    padding: 10px 16px;
    font-size: 12px;
    color: #4F52B2;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: 0.2px;
  }
  .cta:hover { color: #3a3d8c; }
  .cta-arrow { font-size: 13px; }

  /* ----- Dark theme overrides ----- */
  body.theme-dark .card {
    background: #1f1f23;
    color: #f5f5f7;
    border-color: rgba(255, 255, 255, 0.08);
    box-shadow:
      0 16px 40px rgba(0, 0, 0, 0.5),
      0 4px 12px rgba(0, 0, 0, 0.3);
  }
  body.theme-dark .card:hover {
    box-shadow:
      0 22px 50px rgba(0, 0, 0, 0.6),
      0 6px 16px rgba(0, 0, 0, 0.4);
    border-color: rgba(255, 255, 255, 0.12);
  }
  body.theme-dark .app-name { color: #b3b6ff; }
  body.theme-dark .ts { color: #8a8a90; }
  body.theme-dark .close-btn { color: #8a8a90; }
  body.theme-dark .close-btn:hover { background: rgba(255, 255, 255, 0.08); color: #f3f4f6; }
  body.theme-dark .title { color: #f5f5f7; }
  body.theme-dark .message { color: #c9c9cf; }
  body.theme-dark .cta { border-top-color: rgba(255, 255, 255, 0.08); color: #b3b6ff; }
  body.theme-dark .cta:hover { color: #d4d6ff; }

  /* When payload.theme === 'auto', respect OS preference. */
  @media (prefers-color-scheme: dark) {
    body.theme-auto .card {
      background: #1f1f23;
      color: #f5f5f7;
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.5),
        0 4px 12px rgba(0, 0, 0, 0.3);
    }
    body.theme-auto .app-name { color: #b3b6ff; }
    body.theme-auto .ts { color: #8a8a90; }
    body.theme-auto .close-btn { color: #8a8a90; }
    body.theme-auto .close-btn:hover { background: rgba(255, 255, 255, 0.08); color: #f3f4f6; }
    body.theme-auto .title { color: #f5f5f7; }
    body.theme-auto .message { color: #c9c9cf; }
    body.theme-auto .cta { border-top-color: rgba(255, 255, 255, 0.08); color: #b3b6ff; }
  }
</style>
</head>
<body class="theme-light">
<script>
  // -----------------------------------------------------------------
  // Renderer for the custom notification window. See preload for the
  // IPC channel surface.
  // -----------------------------------------------------------------
  const bridge = window.notifBridge;
  if (!bridge) {
    document.body.innerHTML = '';
  }

  const cards = new Map();

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function reportBounds() {
    const w = Math.max(400, document.documentElement.scrollWidth);
    const h = Math.max(80, document.documentElement.scrollHeight);
    if (bridge && bridge.reportBounds) bridge.reportBounds({ width: w, height: h });
  }

  function applyTheme(theme) {
    // Slice 12 — payload.theme controls the body class. Only one of
    // the theme classes is applied at a time so the dark-theme block
    // and the prefers-color-scheme block don't accidentally compose.
    const cls = (theme === 'dark') ? 'theme-dark'
              : (theme === 'auto') ? 'theme-auto'
              : 'theme-light';
    document.body.className = cls;
  }

  function renderCard(payload) {
    if (!payload || !payload.id || !payload.title) return;
    if (cards.has(payload.id)) return;

    // Apply theme from the FIRST card's payload, and re-apply on every
    // subsequent card (cheap; lets a later-arriving notification carry
    // an updated theme if the user toggled it).
    if (payload.theme) applyTheme(payload.theme);

    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', payload.id);

    const senderName = (payload.sender || '').trim();
    const initials = senderName
      ? senderName.split(/\s+/).map(p => p[0]).slice(0, 2).join('').toUpperCase()
      : 'MA';

    const tsLabel = payload.ts ? escapeHtml(payload.ts) : '';

    card.innerHTML = ''
      + '<div class="accent"></div>'
      + '<div class="header">'
      +   (payload.iconUrl
            ? '<img class="app-icon" src="' + escapeHtml(payload.iconUrl) + '" alt="" />'
            : '<span class="app-icon"></span>')
      +   '<span class="app-name">Monday Aniston</span>'
      +   (tsLabel ? '<span class="ts">' + tsLabel + '</span>' : '')
      +   '<button class="close-btn" data-action="close" aria-label="Close">'
      +     '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">'
      +       '<line x1="3" y1="3" x2="13" y2="13" /><line x1="13" y1="3" x2="3" y2="13" />'
      +     '</svg>'
      +   '</button>'
      + '</div>'
      + '<div class="body">'
      +   '<div class="avatar">' + escapeHtml(initials) + '</div>'
      +   '<div class="text">'
      +     '<div class="title">' + escapeHtml(payload.title) + '</div>'
      +     (payload.body ? '<div class="message">' + escapeHtml(payload.body) + '</div>' : '')
      +   '</div>'
      + '</div>'
      + (payload.url
          ? '<div class="cta"><span>Open in Monday Aniston</span><span class="cta-arrow">→</span></div>'
          : '');

    card.addEventListener('mouseenter', () => bridge.hover(payload.id, true));
    card.addEventListener('mouseleave', () => bridge.hover(payload.id, false));

    card.addEventListener('click', (ev) => {
      const closeBtn = ev.target && ev.target.closest && ev.target.closest('[data-action="close"]');
      if (closeBtn) {
        ev.stopPropagation();
        bridge.close(payload.id);
        return;
      }
      bridge.click(payload.id);
    });

    document.body.appendChild(card);
    cards.set(payload.id, card);

    requestAnimationFrame(() => {
      card.classList.add('visible');
      reportBounds();
    });
  }

  function dismissCard(id) {
    const card = cards.get(id);
    if (!card) return;
    card.classList.remove('visible');
    card.classList.add('leaving');
    setTimeout(() => {
      try { card.remove(); } catch (e) { /* ignore */ }
      cards.delete(id);
      reportBounds();
    }, 260);
  }

  function clearAll() {
    for (const id of Array.from(cards.keys())) dismissCard(id);
  }

  if (bridge) {
    bridge.onShow((payload) => renderCard(payload));
    bridge.onDismiss((payload) => { if (payload && payload.id) dismissCard(payload.id); });
    bridge.onClear(() => clearAll());
    reportBounds();
  }
</script>
</body>
</html>
