version: '3.8'

# Development compose — runs all three services with hot reloading via volume mounts
# Backend: nodemon (auto-restart on file changes)
# Frontend: Vite dev server (HMR)
# For local dev without Docker: just run `npm run dev` from the project root

services:
  postgres:
    image: postgres:16-alpine
    container_name: aph-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: aniston_project_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: aph-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aniston_project_hub
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: aniston_super_secret_jwt_key_dev_2024
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ../server:/app
      - backend_modules:/app/node_modules

  frontend:
    image: node:20-alpine
    container_name: aph-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ../client:/app
      - frontend_modules:/app/node_modules

volumes:
  postgres_dev_data:
  backend_modules:
  frontend_modules:
