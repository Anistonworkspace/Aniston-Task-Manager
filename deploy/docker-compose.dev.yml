version: '3.8'

# Development compose — runs all three services with hot reloading via volume mounts
# Backend: nodemon (auto-restart on file changes)
# Frontend: Vite dev server (HMR)
# For local dev without Docker: just run `npm run dev` from the project root

services:
  postgres:
    image: postgres:16-alpine
    container_name: aph-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: aniston_project_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: aph-backend-dev
    working_dir: /app
    # postgresql16-client provides `pg_dump` and `psql`, used by the Tier-1
    # backup/restore service (server/services/backupService.js). The
    # production image (deploy/Dockerfile.server) installs these too —
    # this `apk add` is the dev-mode equivalent so backups work without
    # needing DB_BACKUP_VIA_DOCKER (the backend container has no `docker`
    # CLI, so docker-exec mode is not viable here). Version must match
    # the postgres SERVER major (currently 16).
    # postgresql16-client must be re-added on each fresh container (it installs
    # outside the node_modules volume). npm install now runs ONLY when the
    # node_modules volume is empty (first boot / after `docker compose down -v`),
    # instead of on every restart — the per-restart install was the main cause
    # of the slow, ECONNREFUSED-y window after each container restart. If you
    # change package.json, run a one-off `docker compose ... run --rm backend npm install`
    # or recreate with the volume removed.
    command: sh -c "apk add --no-cache postgresql16-client && { [ -d node_modules/express ] || npm install; } && npm run dev"
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aniston_project_hub
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: aniston_super_secret_jwt_key_dev_2024
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ../server:/app
      - backend_modules:/app/node_modules

  frontend:
    image: node:20-alpine
    container_name: aph-frontend-dev
    working_dir: /app
    command: sh -c "{ [ -d node_modules/vite ] || npm install; } && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:5000
      # Forces Vite/chokidar into polling mode so it detects host edits across
      # the Windows bind mount (see client/vite.config.js). Without this, HMR
      # silently stops and you must restart the container to see changes.
      CHOKIDAR_USEPOLLING: "true"
      # Each fs.stat over the Docker Desktop Windows bind mount costs ~30-40ms
      # (vs microseconds natively). With the default 4-thread libuv pool, the
      # file-watcher's polling stats saturate every thread and Vite's own reads
      # (serving pages, relaying /api proxy responses) queue behind them, making
      # the dev server hang for seconds. A large pool absorbs the stat storm and
      # keeps threads free to serve. Threads are cheap; idle ones cost nothing.
      UV_THREADPOOL_SIZE: "64"
    ports:
      - "3000:3000"
    volumes:
      - ../client:/app
      - frontend_modules:/app/node_modules

volumes:
  postgres_dev_data:
  backend_modules:
  frontend_modules:
