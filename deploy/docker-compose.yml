services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aniston_project_hub
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: aph-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aniston_project_hub
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret}
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      TEAMS_CLIENT_ID: ${TEAMS_CLIENT_ID:-}
      TEAMS_CLIENT_SECRET: ${TEAMS_CLIENT_SECRET:-}
      TEAMS_TENANT_ID: ${TEAMS_TENANT_ID:-}
      TEAMS_REDIRECT_URI: ${TEAMS_REDIRECT_URI:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@anistonav.com}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-26214400}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  # Frontend (Nginx)
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: aph-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
