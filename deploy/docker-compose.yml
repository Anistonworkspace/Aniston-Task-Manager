services:
  # PostgreSQL Database
  # NOT exposed on host — backend reaches it via Docker DNS (DB_HOST=postgres).
  # Publishing 5432 to the host caused collisions with host-level/other services
  # and is unnecessary since the app network is self-contained. For ad-hoc DB access
  # on the EC2 box, use: `docker exec -it aph-postgres psql -U $DB_USER aniston_project_hub`
  postgres:
    image: postgres:16-alpine
    container_name: aph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aniston_project_hub
      # P0-6: fail-fast if the operator forgot to set DB credentials.
      # Composing without these in .env now errors instead of silently
      # using insecure defaults (e.g. password "changeme").
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backup.sh:/backup.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: aph-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aniston_project_hub
      # P0-6: fail-fast on missing critical secrets. No silent fallbacks.
      # server.js also asserts these at boot, but compose-level enforcement
      # means the container won't even start with placeholder values.
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      TEAMS_CLIENT_ID: ${TEAMS_CLIENT_ID:-}
      TEAMS_CLIENT_SECRET: ${TEAMS_CLIENT_SECRET:-}
      TEAMS_TENANT_ID: ${TEAMS_TENANT_ID:-}
      TEAMS_REDIRECT_URI: ${TEAMS_REDIRECT_URI:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@anistonav.com}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-26214400}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      # node:20-alpine ships with `wget` but NOT `curl`. The previous probe
      # used curl and silently returned 127 ("command not found") every 30s,
      # which Docker correctly reads as failure → marks the container
      # unhealthy even when the app itself is serving 200s. Switching to
      # `wget --spider` matches what's actually installed and lines up with
      # the Dockerfile-level HEALTHCHECK in deploy/Dockerfile.server.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # Frontend (Nginx)
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: aph-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data:
