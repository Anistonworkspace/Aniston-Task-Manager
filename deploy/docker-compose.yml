services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: aph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aniston_project_hub
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      # Performance tuning for small-medium workloads
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only — not exposed to internet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backup.sh:/backup.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d aniston_project_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend API ───
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: aph-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aniston_project_hub
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret}
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      TEAMS_CLIENT_ID: ${TEAMS_CLIENT_ID:-}
      TEAMS_CLIENT_SECRET: ${TEAMS_CLIENT_SECRET:-}
      TEAMS_TENANT_ID: ${TEAMS_TENANT_ID:-}
      TEAMS_REDIRECT_URI: ${TEAMS_REDIRECT_URI:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@anistonav.com}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-26214400}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # Give Node.js + DB sync time to initialize
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Frontend (Nginx) ───
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: aph-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy  # Only start frontend after backend is ready
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: aph-postgres-data    # Named volume — survives compose down/up
  uploads_data:
    name: aph-uploads-data
