apiVersion: v1
kind: ConfigMap
metadata:
  name: aniston-hub-config
  namespace: aniston-apps
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "aniston_project_hub"
  DB_USER: "postgres"
  CLIENT_URL: "https://monday.anistonav.com"
  TEAMS_REDIRECT_URI: "https://monday.anistonav.com/api/teams/callback"
  VAPID_SUBJECT: "mailto:admin@anistonav.com"
  MAX_FILE_SIZE: "26214400"
  UPLOAD_DIR: "uploads"
